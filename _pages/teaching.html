<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teaching - Rizeng Chen</title>
    <style>
        :root {
            --beida-red: #94070a;
            --beida-red-light: #b80d12;
            --beida-gold: #c4922e;
            --bg-main: #fafaf8;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #444444;
            --text-muted: #6b6b6b;
            --border: #e5e3df;
            --border-light: #f0ede8;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 28px rgba(0, 0, 0, 0.08), 0 3px 10px rgba(0, 0, 0, 0.05);
            --transition-fast: 0.18s ease;
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-serif: 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', 'Times New Roman', serif;
            --font-sans: 'Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: #f5f4f1;
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(148, 7, 10, 0.018) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 90%, rgba(196, 146, 46, 0.015) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.008) 0%, transparent 70%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px 16px 60px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            max-width: 100%;
        }

        /* 统一顶部菜单背景 */
        #site-nav.greedy-nav {
            background-color: #f5f4f1 !important;
            background-image: radial-gradient(ellipse at 15% 10%, rgba(148, 7, 10, 0.018) 0%, transparent 60%),
                              radial-gradient(ellipse at 85% 90%, rgba(196, 146, 46, 0.015) 0%, transparent 60%),
                              radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.008) 0%, transparent 70%) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: none;
        }
        .greedy-nav .nav-links a,
        .greedy-nav .site-title {
            color: #1a1a1a !important;
        }
        .greedy-nav .greedy-nav__toggle {
            background-color: transparent !important;
        }
        .greedy-nav .hidden-links {
            background-color: #f5f4f1 !important;
            border: 1px solid var(--border);
        }

        .main-container {
            max-width: 880px;
            margin: 0 auto;
            padding: 0 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .page-header {
            text-align: center;
            padding: 32px 20px 28px;
            position: relative;
            margin-bottom: 20px;
        }
        .page-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--beida-red), var(--beida-gold));
            border-radius: 3px;
            opacity: 0.7;
        }
        .page-header .icon-svg {
            width: 38px;
            height: 38px;
            margin-bottom: 6px;
        }
        .page-header h1 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            color: #1a1a1a;
            line-height: 1.2;
        }
        .page-header .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.02em;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            padding: 14px 20px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .stat-number {
            font-weight: 700;
            color: var(--beida-red);
            font-size: 1.15rem;
            font-family: var(--font-mono);
        }
        .stat-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            align-self: center;
        }

        .section-heading {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--beida-red);
            border-left: 5px solid var(--beida-gold);
            padding-left: 16px;
            margin: 0 0 20px 0;
            letter-spacing: -0.01em;
        }

        .course-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .course-item {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 18px 20px 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: all var(--transition-smooth);
        }
        .course-item:hover {
            box-shadow: var(--shadow-md);
            border-color: #dcd8d0;
            transform: translateY(-1px);
        }
        .course-item.expanded {
            box-shadow: var(--shadow-lg);
            border-color: #d5cfc6;
        }

        .course-title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            padding: 3px 6px 3px 0;
            border-radius: var(--radius-sm);
            transition: background-color var(--transition-fast);
        }
        .course-title-row:hover {
            background-color: rgba(148, 7, 10, 0.025);
        }
        .course-main-info {
            flex: 1;
        }
        .course-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        .course-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .course-meta a {
            color: var(--beida-red);
            text-decoration: none;
            border-bottom: 1px dotted transparent;
            transition: border-color var(--transition-fast);
        }
        .course-meta a:hover {
            border-bottom-color: var(--beida-red);
        }
        .expand-icon {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--transition-bounce);
            color: #999;
        }
        .course-item.expanded .expand-icon {
            transform: rotate(90deg);
            color: var(--beida-red);
        }
        .expand-icon svg {
            width: 14px;
            height: 14px;
        }

        .course-detail-wrapper {
            overflow: hidden;
            max-height: 0;
            transition: max-height var(--transition-bounce), opacity var(--transition-smooth);
            opacity: 0;
            margin-top: 0;
        }
        .course-detail-wrapper.open {
            max-height: 800px;
            opacity: 1;
            margin-top: 16px;
        }
        .course-detail-inner {
            background: #fdfcf9;
            border-left: 3px solid #e5dfd4;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            padding: 16px 20px;
            font-size: 0.9rem;
            line-height: 1.7;
            color: #4a4a4a;
        }
        .course-item.expanded .course-detail-inner {
            border-left-color: #c4922e;
            background: #fefdf9;
        }
        .detail-section {
            margin-bottom: 1rem;
        }
        .detail-section strong {
            color: var(--beida-red);
            font-weight: 600;
        }
        .detail-list {
            list-style: none;
            padding-left: 0;
        }
        .detail-list li {
            margin-bottom: 0.3rem;
        }
        hr {
            margin: 0.8rem 0;
            border: none;
            border-top: 1px solid var(--border-light);
        }

        @media (max-width: 768px) {
            .page-header h1 { font-size: 1.7rem; }
            .course-name { font-size: 1rem; }
            .course-meta { font-size: 0.75rem; }
            .course-item { padding: 14px 14px 12px; }
            .course-detail-inner { padding: 12px 14px; font-size: 0.85rem; }
            .stats-bar { gap: 14px; font-size: 0.8rem; }
            .section-heading { font-size: 1.3rem; }
        }
        @media (max-width: 480px) {
            .course-title-row { gap: 8px; }
            .expand-icon { width: 18px; height: 18px; }
            .stats-bar .stat-divider { display: none; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <header class="page-header">
       <svg class="icon-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
	 <!-- 黑板边框 -->
	 <rect x="8" y="6" width="32" height="30" rx="2" stroke="#94070a" stroke-width="2.5" fill="none"/>
	 <!-- 板书虚线 -->
	 <line x1="14" y1="14" x2="34" y2="14" stroke="#94070a" stroke-width="1.5" stroke-dasharray="2 2"/>
	 <line x1="14" y1="20" x2="30" y2="20" stroke="#94070a" stroke-width="1.5" stroke-dasharray="2 2"/>
	 <line x1="14" y1="26" x2="26" y2="26" stroke="#94070a" stroke-width="1.5" stroke-dasharray="2 2"/>
	 <!-- 粉笔（增大尺寸，顺时针旋转+35度，边缘加深） -->
	 <g transform="rotate(35, 36, 34)">
           <rect x="28" y="30" width="18" height="6" rx="1.5" fill="#f8f8f8" stroke="#555" stroke-width="1.5"/>
	 </g>
       </svg>
        <h1>Teaching</h1>
    </header>

    <div class="stats-bar">
        <div class="stat-item">📚 <span class="stat-number" id="totalCount">5</span> Courses</div>
        <span class="stat-divider"></span>
        <div class="stat-item">🎓 PKU · SMS</div>
    </div>

    <h2 class="section-heading">📖 Courses as Teaching Assistant</h2>

    <div class="course-list" id="courseList"></div>
</div>

<script src="/assets/js/teaching.js"></script>
</body>
</html>
